<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CoWork Hub | دخول</title>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-intro">
            <p class="eyebrow">CoWork Hub</p>
            <h1>إدارة وحجز مساحات العمل</h1>
            <p>سجل دخولك للوصول للبحث عن المساحات، إنشاء الحجوزات، التقييمات، ولوحات الإدارة حسب صلاحيتك.</p>
        </section>

        <section class="panel auth-panel" id="loginForm">
            <h2>تسجيل الدخول</h2>
            <label for="loginUser">اسم المستخدم</label>
            <input type="text" id="loginUser" autocomplete="username">
            <label for="loginPass">كلمة المرور</label>
            <input type="password" id="loginPass" autocomplete="current-password">
            <button onclick="login()">دخول</button>
            <button class="secondary" onclick="toggleForm()">إنشاء حساب جديد</button>
            <p class="message" id="loginMessage"></p>
        </section>

        <section class="panel auth-panel hidden" id="registerForm">
            <h2>حساب جديد</h2>
            <label for="regUser">اسم المستخدم</label>
            <input type="text" id="regUser" autocomplete="username">
            <label for="regEmail">البريد الإلكتروني</label>
            <input type="email" id="regEmail" autocomplete="email">
            <label for="regPass">كلمة المرور</label>
            <input type="password" id="regPass" autocomplete="new-password">
            <button onclick="register()">تسجيل</button>
            <button class="secondary" onclick="toggleForm()">لدي حساب بالفعل</button>
            <p class="message" id="registerMessage"></p>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
