<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CoWork Hub | الإدارة</title>
</head>
<body>
    <nav class="topbar">
        <div>
            <strong>CoWork Hub</strong>
            <span id="displayUser"></span>
            <span class="role-pill" id="displayRole"></span>
        </div>
        <div class="nav-actions">
            <a href="dashboard.htm">الرئيسية</a>
            <a href="admin.htm">الإدارة</a>
            <button class="ghost" onclick="logout()">خروج</button>
        </div>
    </nav>

    <main class="app-shell">
        <section class="page-header">
            <div>
                <h1>لوحة الإدارة</h1>
                <p>إدارة المستخدمين، المساحات، الحجوزات، والفواتير من خلال الـ gateway.</p>
            </div>
        </section>

        <section class="admin-grid">
            <div class="panel">
                <h2>إضافة مستخدم</h2>
                <label for="empUser">اسم المستخدم</label>
                <input type="text" id="empUser">
                <label for="empEmail">البريد الإلكتروني</label>
                <input type="email" id="empEmail">
                <label for="empPass">كلمة المرور</label>
                <input type="password" id="empPass">
                <label for="empRole">الصلاحية</label>
                <select id="empRole">
                    <option value="EMPLOYEE">موظف</option>
                    <option value="ADMIN">مدير</option>
                    <option value="CUSTOMER">عميل</option>
                </select>
                <button onclick="addEmployee()">إضافة</button>
                <p class="message" id="adminMessage"></p>
            </div>

            <div class="panel">
                <div class="section-title">
                    <h2>المستخدمون</h2>
                    <button class="secondary small" onclick="loadAllUsers()">تحديث</button>
                </div>
                <div class="stack-list" id="userList"></div>
            </div>
        </section>

        <section class="panel">
            <h2>إضافة مساحة عمل</h2>
            <div class="form-grid">
                <div>
                    <label for="workspaceName">اسم المساحة</label>
                    <input type="text" id="workspaceName">
                </div>
                <div>
                    <label for="workspaceType">النوع</label>
                    <select id="workspaceType">
                        <option value="MEETING_ROOM">Meeting Room</option>
                        <option value="PRIVATE_OFFICE">Private Office</option>
                        <option value="DEDICATED_DESK">Dedicated Desk</option>
                        <option value="SHARED_SPACE">Shared Space</option>
                    </select>
                </div>
                <div>
                    <label for="workspacePrice">السعر بالساعة</label>
                    <input type="number" id="workspacePrice" min="0" step="0.5">
                </div>
                <div>
                    <label for="workspaceCapacity">السعة</label>
                    <input type="number" id="workspaceCapacity" min="1">
                </div>
                <div class="wide">
                    <label for="workspaceDescription">الوصف</label>
                    <input type="text" id="workspaceDescription">
                </div>
                <button class="align-end" onclick="addWorkspace()">إضافة المساحة</button>
            </div>
            <p class="message" id="workspaceAdminMessage"></p>
        </section>

        <section class="admin-grid">
            <div class="panel">
                <div class="section-title">
                    <h2>الحجوزات</h2>
                    <button class="secondary small" onclick="loadAllBookings()">تحديث</button>
                </div>
                <div class="stack-list" id="bookingList"></div>
            </div>

            <div class="panel">
                <div class="section-title">
                    <h2>الفواتير</h2>
                    <button class="secondary small" onclick="loadAllInvoices()">تحديث</button>
                </div>
                <div class="stack-list" id="invoiceList"></div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script>
        requireAuth();
        requireAdmin();
        initAdmin();
    </script>
</body>
</html>
