services:
  mysql:
    image: mysql:8.4
    container_name: coworkhub-mysql
    networks:
      - coworkhub-network
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_v2:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  kafka:
    image: apache/kafka:3.7.2
    container_name: coworkhub-kafka
    networks:
      - coworkhub-network
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"

  discovery:
    build:
      context: ./discovery
    container_name: coworkhub-discovery
    networks:
      - coworkhub-network
    ports:
      - "8761:8761"

  user:
    build:
      context: ./user
    container_name: coworkhub-user
    networks:
      - coworkhub-network
    depends_on:
      mysql:
        condition: service_healthy
      discovery:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: coworking_db
      DB_USERNAME: springstudent
      DB_PASSWORD: springstudent
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    ports:
      - "8081:8081"

  booking:
    build:
      context: ./booking
    container_name: coworkhub-booking
    networks:
      - coworkhub-network
    depends_on:
      mysql:
        condition: service_healthy
      discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: coworking_main_db
      DB_USERNAME: springstudent
      DB_PASSWORD: springstudent
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"

  invoice:
    build:
      context: ./invoice
    container_name: coworkhub-invoice
    networks:
      - coworkhub-network
    depends_on:
      mysql:
        condition: service_healthy
      discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: coworking_main_db
      DB_USERNAME: springstudent
      DB_PASSWORD: springstudent
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"

  gateway:
    build:
      context: ./gateway
    container_name: coworkhub-gateway
    networks:
      - coworkhub-network
    depends_on:
      discovery:
        condition: service_started
      user:
        condition: service_started
      booking:
        condition: service_started
      invoice:
        condition: service_started
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      USER_SERVICE_URL: http://user:8081
      BOOKING_SERVICE_URL: http://booking:8082
      INVOICE_SERVICE_URL: http://invoice:8083
    ports:
      - "8080:8080"

volumes:
  mysql_data_v2:

networks:
  coworkhub-network:
    driver: bridge
