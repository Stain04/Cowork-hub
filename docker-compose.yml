services:
  mysql:
    image: mysql:8.4
    container_name: coworkhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  discovery:
    build:
      context: ./discovery
    container_name: coworkhub-discovery
    ports:
      - "8761:8761"

  user:
    build:
      context: ./user
    container_name: coworkhub-user
    depends_on:
      mysql:
        condition: service_healthy
      discovery:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: coworking_db
      DB_USERNAME: springstudent
      DB_PASSWORD: springstudent
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    ports:
      - "8081:8081"

  booking:
    build:
      context: ./booking
    container_name: coworkhub-booking
    depends_on:
      mysql:
        condition: service_healthy
      discovery:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: coworking_main_db
      DB_USERNAME: springstudent
      DB_PASSWORD: springstudent
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
    ports:
      - "8082:8082"

  gateway:
    build:
      context: ./gateway
    container_name: coworkhub-gateway
    depends_on:
      discovery:
        condition: service_started
      user:
        condition: service_started
      booking:
        condition: service_started
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka/
      USER_SERVICE_URL: http://user:8081
      BOOKING_SERVICE_URL: http://booking:8082
    ports:
      - "8080:8080"

volumes:
  mysql_data:
